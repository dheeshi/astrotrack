# Database URL pointing to your local instance and the astrotrack database
spring.datasource.url=jdbc:postgresql://localhost:5432/astrotrack

# Your PostgreSQL username (default is usually postgres)
spring.datasource.username=postgres

# Your PostgreSQL password (replace this with your actual password)
spring.datasource.password=752000

# Hibernate properties
# 'update' automatically creates or updates database tables based on your Java code
spring.jpa.hibernate.ddl-auto=update

# Shows the SQL queries in the console (great for learning!)
spring.jpa.show-sql=true